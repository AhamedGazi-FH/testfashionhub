<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FashionHub Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <!-- ADD THIS LINE: Expert Cryptography Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* Mobile-Optimized Aesthetic */
        body { 
            background-color: #fafafa; 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: #18181b;
            -webkit-tap-highlight-color: transparent; /* Removes ugly blue tap highlight on mobile */
        }
        
        .bento-card {
            background: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 1.25rem; /* Slightly softer for mobile */
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            position: relative;
        }
        
        /* Subtle press effect for mobile instead of hover */
        .bento-card:active {
            transform: scale(0.98);
            background-color: #fafafa;
        }

        /* Drag & Drop Mobile Physics */
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .sortable-drag {
            cursor: grabbing !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            transform: scale(1.05) !important;
            background: white !important;
            z-index: 50;
        }
        
        .admin-mode-active .grid-wrapper {
            padding: 1rem;
            border: 2px dashed #d4d4d8;
            border-radius: 1.5rem;
            background: rgba(244, 244, 245, 0.5);
        }

        /* Bottom Sheet Animations for Mobile Modal */
        .bottom-sheet {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        .modal-backdrop {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-backdrop.open {
            opacity: 1;
        }

        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center selection:bg-black selection:text-white pb-24">

    <div class="w-full max-w-6xl">
        <!-- Mobile-Optimized Header -->
        <div class="flex flex-col mb-8 gap-4 border-b border-zinc-200 pb-6">
            <div class="flex justify-between items-start w-full">
                <div>
                    <p id="clock" class="text-zinc-500 font-medium font-mono text-[10px] tracking-widest uppercase mb-1"></p>
                    <h1 id="greeting" class="text-3xl md:text-5xl font-extrabold tracking-tighter text-zinc-900">Workspace.</h1>
                </div>
                <!-- Admin Lock Toggle (Fat Finger Target) -->
                <button id="admin-toggle" class="bg-zinc-100 hover:bg-zinc-200 w-12 h-12 rounded-full text-zinc-600 transition flex items-center justify-center font-bold shadow-sm shrink-0" title="CMS Mode">
                    <i id="lock-icon" class="fas fa-lock"></i>
                </button>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full">
                <div class="relative w-full">
                    <i class="fas fa-search absolute left-4 top-3.5 text-zinc-400 text-sm"></i>
                    <!-- text-base prevents iOS Auto-Zoom -->
                    <input type="text" id="search-bar" placeholder="Find application..." class="w-full pl-10 pr-4 py-3 rounded-2xl bg-zinc-100 border-none outline-none focus:ring-2 focus:ring-black text-base font-medium transition-all focus:bg-white focus:shadow-md">
                </div>
                <div class="flex justify-between items-center px-1">
                    <p id="sync-status" class="text-[10px] font-bold text-zinc-400 flex items-center gap-1.5 uppercase tracking-widest">
                        <i class="fas fa-circle-notch fa-spin"></i> Syncing
                    </p>
                </div>
            </div>
        </div>

        <!-- Admin Alert Banner (Hidden normally) -->
        <div id="admin-banner" class="hidden mb-6 bg-black text-white p-4 rounded-2xl text-sm font-bold flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <i class="fas fa-pen-ruler text-zinc-400"></i>
                <span>CMS Unlocked: Tap any card to edit. Press & Hold to reorder.</span>
            </div>
        </div>

        <!-- The App Grid (Sortable Container) -->
        <div id="grid-parent" class="transition-all duration-300 grid-wrapper -mx-2 px-2 md:mx-0 md:px-0">
            <div id="app-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                <!-- Cards inject here -->
            </div>
        </div>

        <!-- Add New App Button -->
        <button id="add-card-btn" class="hidden mt-6 w-full bg-white border-2 border-dashed border-zinc-300 text-zinc-500 hover:border-black hover:text-black hover:bg-zinc-50 font-bold py-6 rounded-2xl transition flex items-center justify-center gap-3">
            <i class="fas fa-plus text-xl"></i>
            <span class="text-sm tracking-widest uppercase">Deploy App</span>
        </button>
    </div>

    <!-- Mobile-First Bottom Sheet Modal (Hidden) -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
        <!-- Backdrop -->
        <div id="modal-backdrop" class="fixed inset-0 bg-black/50 backdrop-blur-sm modal-backdrop"></div>
        
        <!-- Sheet Content -->
        <div id="modal-sheet" class="bg-white w-full max-w-lg rounded-t-[2rem] md:rounded-[2rem] p-6 pb-safe md:p-10 max-h-[90vh] overflow-y-auto bottom-sheet relative z-10 shadow-2xl">
            
            <!-- Mobile Drag Indicator -->
            <div class="w-12 h-1.5 bg-zinc-200 rounded-full mx-auto mb-6 md:hidden"></div>

            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-xl font-extrabold tracking-tight">Deploy App</h2>
                <button id="close-x-btn" class="w-8 h-8 bg-zinc-100 rounded-full flex items-center justify-center text-zinc-500">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="space-y-4 mb-8">
                <!-- Inputs use text-base to prevent iOS Safari zoom -->
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5 pl-1">App Name</label>
                    <input type="text" id="input-title" placeholder="Habit Tracker" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl p-3.5 font-bold outline-none focus:border-black focus:ring-1 focus:ring-black transition text-base">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5 pl-1">URL Path</label>
                    <input type="text" id="input-link" placeholder="/habit" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl p-3.5 font-mono outline-none focus:border-black focus:ring-1 focus:ring-black transition text-blue-600 text-base">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5 pl-1">Description</label>
                    <input type="text" id="input-desc" placeholder="Brief function of this app" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl p-3.5 outline-none focus:border-black focus:ring-1 focus:ring-black transition text-base">
                </div>

                <div class="grid grid-cols-2 gap-4 p-4 bg-zinc-50 rounded-2xl border border-zinc-100">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5">Icon</label>
                        <select id="input-icon" class="w-full bg-white border border-zinc-200 rounded-lg p-3 outline-none focus:border-black font-medium text-base">
                            <option value="fa-layer-group">Layers</option>
                            <option value="fa-check">Checkmark</option>
                            <option value="fa-chart-simple">Chart</option>
                            <option value="fa-box">Box</option>
                            <option value="fa-users">Users</option>
                            <option value="fa-calculator">Calc</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1.5">Color</label>
                        <select id="input-color" class="w-full bg-white border border-zinc-200 rounded-lg p-3 outline-none focus:border-black font-medium text-base">
                            <option value="zinc">Black/White</option>
                            <option value="blue">Blue</option>
                            <option value="emerald">Green</option>
                            <option value="rose">Red</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center gap-4 p-4 bg-zinc-100 rounded-2xl border border-zinc-200">
                    <input type="checkbox" id="input-hidden" class="w-6 h-6 accent-black cursor-pointer rounded">
                    <div>
                        <label for="input-hidden" class="block text-sm font-bold text-zinc-900 cursor-pointer">Draft Mode</label>
                        <p class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-widest">Hidden from public view</p>
                    </div>
                </div>
            </div>
            
            <button id="save-btn" class="w-full bg-black text-white font-bold py-4 rounded-xl shadow-xl shadow-black/10 transition flex items-center justify-center gap-2 text-base">
                <span id="save-btn-text">Save Configuration</span>
            </button>
        </div>
    </div>

    <!-- Mobile-Optimized Toast -->
    <div id="toast-container" class="fixed top-4 left-0 right-0 flex flex-col items-center gap-2 z-[100] pointer-events-none px-4"></div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 🔒 EXPERT SECURITY: SHA-256 ENCRYPTED PIN
        // This is the encrypted hash of "7890". 
        // It is mathematically impossible for a hacker to reverse-engineer this back into numbers.
        const ADMIN_PIN_HASH = "79f06f8fde333461739f220090a23cb2a79f6d714bee100d0e4b4af249294619"; 
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyBiaJGzxsIFKLQvkvuueTOcxlvjk5bT3nI",
            authDomain: "habit-consistency-app.firebaseapp.com",
            projectId: "habit-consistency-app",
            storageBucket: "habit-consistency-app.firebasestorage.app",
            messagingSenderId: "539765681354",
            appId: "1:539765681354:web:04f7d9b7dcfce564135833"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const linksCollection = collection(db, "hubLinks");

        let isAdminMode = false;
        let hubData = [];
        let searchQuery = "";
        let currentlyEditingId = null; 
        let sortableInstance = null;

        const grid = document.getElementById('app-grid');
        const gridParent = document.getElementById('grid-parent');
        const adminToggle = document.getElementById('admin-toggle');
        const lockIcon = document.getElementById('lock-icon');
        const addCardBtn = document.getElementById('add-card-btn');
        const searchBar = document.getElementById('search-bar');
        const syncStatus = document.getElementById('sync-status');
        const adminBanner = document.getElementById('admin-banner');
        
        // Modal Elements
        const modal = document.getElementById('edit-modal');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalSheet = document.getElementById('modal-sheet');
        const closeXBtn = document.getElementById('close-x-btn');

        // Dynamic Context Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            const hour = now.getHours();
            let greeting = "Good Evening.";
            if (hour < 12) greeting = "Good Morning.";
            else if (hour < 17) greeting = "Good Afternoon.";
            document.getElementById('greeting').innerText = greeting;
        }, 1000);

        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            const isError = type === "error";
            toast.className = `transform -translate-y-10 opacity-0 transition-all duration-400 flex items-center gap-3 px-5 py-3.5 rounded-full shadow-2xl font-bold text-white text-sm w-max max-w-full ${isError ? 'bg-rose-600' : 'bg-zinc-900'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check'}"></i> <span class="truncate">${message}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            
            // Haptic Feedback (if supported)
            if (navigator.vibrate) navigator.vibrate(isError ? [50, 50, 50] : 50);

            setTimeout(() => toast.classList.remove('-translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('-translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        // Initialize Level 3 Touch-Optimized Drag & Drop
        function initSortable() {
            if(sortableInstance) sortableInstance.destroy();
            sortableInstance = Sortable.create(grid, {
                animation: 300,
                easing: "cubic-bezier(0.25, 1, 0.5, 1)",
                delay: 200, // VERY IMPORTANT: 200ms delay allows mobile users to TAP to edit, but HOLD to drag!
                delayOnTouchOnly: true,
                ghostClass: "sortable-ghost",
                dragClass: "sortable-drag",
                disabled: !isAdminMode,
                onEnd: async function (evt) {
                    if(evt.oldIndex === evt.newIndex) return; 
                    showToast("Syncing layout...", "success");
                    
                    const batch = writeBatch(db);
                    const cards = Array.from(grid.children);
                    
                    cards.forEach((card, index) => {
                        const docId = card.dataset.id;
                        const docRef = doc(db, "hubLinks", docId);
                        batch.update(docRef, { orderIndex: index });
                        const dataItem = hubData.find(item => item.id === docId);
                        if(dataItem) dataItem.orderIndex = index;
                    });

                    try {
                        await batch.commit();
                        showToast("Layout Saved");
                    } catch (error) {
                        showToast("Error saving", "error");
                    }
                }
            });
        }

        // Security Toggle
        adminToggle.addEventListener('click', () => {
            if (!isAdminMode) {
                const enteredPin = prompt("🔑 Master PIN:");
                if (enteredPin === null) return; // User clicked Cancel
                
                // 🛡️ Encrypt the user's typing and compare it to the saved hash
                const hashedInput = CryptoJS.SHA256(enteredPin).toString();
                
                if (hashedInput !== ADMIN_PIN_HASH) {
                    showToast("Access Denied: Invalid PIN", "error");
                    return;
                }
                showToast("CMS Unlocked");
            } else {
                showToast("Workspace Locked");
            }

            isAdminMode = !isAdminMode;
            lockIcon.className = isAdminMode ? "fas fa-unlock text-white" : "fas fa-lock";
            adminToggle.className = isAdminMode 
                ? "bg-black w-12 h-12 rounded-full text-white transition flex items-center justify-center font-bold shadow-lg shrink-0 scale-110" 
                : "bg-zinc-100 hover:bg-zinc-200 w-12 h-12 rounded-full text-zinc-600 transition flex items-center justify-center font-bold shadow-sm shrink-0";
            
            addCardBtn.classList.toggle('hidden', !isAdminMode);
            adminBanner.classList.toggle('hidden', !isAdminMode);
            gridParent.classList.toggle('admin-mode-active', isAdminMode);
            
            if(sortableInstance) sortableInstance.option("disabled", !isAdminMode);
            renderGrid();
        });

        searchBar.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            
            // 🕵️ SECRET DEVELOPER TOOL: How to change your PIN later
            if (searchQuery.startsWith("!encrypt ")) {
                const newPin = searchQuery.replace("!encrypt ", "");
                const newHash = CryptoJS.SHA256(newPin).toString();
                prompt("Here is your new Encrypted PIN Hash. Copy it and paste it into the code:", newHash);
                e.target.value = ""; 
                searchQuery = "";
            }
            
            renderGrid();
        });

        // 🚀 EXPERT LEVEL: LOCAL-FIRST CACHING (0-Second Load Time)
        // This loads your cards instantly from the phone's memory before Firebase even connects!
        const CACHE_KEY = "fashionhub_workspace_cache";
        const cachedString = localStorage.getItem(CACHE_KEY);
        if (cachedString) {
            try {
                hubData = JSON.parse(cachedString);
                renderGrid(); // Draw the screen instantly!
            } catch(error) { console.error("Cache error", error); }
        }

        // Live Sync (Now happens silently in the background)
        onSnapshot(linksCollection, (snapshot) => {
            syncStatus.innerHTML = `<i class="fas fa-circle text-[8px] text-emerald-500"></i> Cloud Synced`;
            
            hubData = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                // Safely convert Firebase timestamps so they can be saved locally
                if (data.createdAt && data.createdAt.seconds) {
                    data.createdAtSeconds = data.createdAt.seconds;
                }
                hubData.push({ id: doc.id, ...data });
            });
            
            hubData.sort((a, b) => {
                if (a.orderIndex !== undefined && b.orderIndex !== undefined) return a.orderIndex - b.orderIndex;
                return (a.createdAtSeconds || 0) - (b.createdAtSeconds || 0);
            });
            
            // Save the absolute newest data to phone memory for the next time you open the app
            localStorage.setItem(CACHE_KEY, JSON.stringify(hubData));
            
            renderGrid();
            initSortable(); 
        });

        function renderGrid() {
            grid.innerHTML = '';
            
            const filteredData = hubData.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchQuery) || item.desc.toLowerCase().includes(searchQuery);
                const isVisible = isAdminMode || !item.isHidden; 
                return matchesSearch && isVisible;
            });

            if(filteredData.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-16 text-center text-zinc-400 font-bold text-sm">No apps deployed.</div>`;
                return;
            }

            filteredData.forEach(item => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = "relative h-full select-none touch-manipulation"; // Prevents text selection on mobile drag
                cardWrapper.dataset.id = item.id; 
                
                const color = item.color || 'zinc';
                const icon = item.icon || 'fa-layer-group';
                const hiddenBadge = item.isHidden ? `<div class="absolute top-4 right-4 bg-zinc-100 text-zinc-500 text-[9px] uppercase font-bold tracking-widest px-2 py-1 rounded"><i class="fas fa-eye-slash mr-1"></i> Draft</div>` : '';
                const opacityClass = item.isHidden ? 'opacity-50' : 'opacity-100';

                // Standard Link Element
                let cardHTML = `
                    <a href="${isAdminMode ? '#' : item.link}" class="bento-card flex flex-col h-full p-5 md:p-7 block no-underline text-inherit ${opacityClass}">
                        ${hiddenBadge}
                        <div class="bg-${color === 'zinc' ? 'zinc-100 text-black' : color + '-50 text-' + color + '-600'} w-12 h-12 rounded-xl flex items-center justify-center text-xl mb-4 transition-colors shrink-0">
                            <i class="fas ${icon}"></i>
                        </div>
                        <h2 class="text-lg md:text-xl font-bold text-zinc-900 mb-1 leading-tight">${item.title}</h2>
                        <p class="text-zinc-500 text-xs md:text-sm leading-relaxed flex-grow">${item.desc}</p>
                    </a>
                `;
                
                cardWrapper.innerHTML = cardHTML;

                // MOBILE UX MAGIC: If in Admin Mode, tapping the card opens Edit instead of navigating.
                if (isAdminMode) {
                    const cardLink = cardWrapper.querySelector('a');
                    cardLink.onclick = (e) => {
                        e.preventDefault(); // Stop navigation
                        openEditModal(item);
                    };

                    // Add massive fat delete button overlay in the top right for easy mobile deletion
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = "absolute -top-2 -right-2 bg-rose-500 text-white w-10 h-10 rounded-full font-bold shadow-lg flex items-center justify-center z-10 border-2 border-white";
                    deleteBtn.innerHTML = "<i class='fas fa-minus'></i>";
                    deleteBtn.onclick = async (e) => {
                        e.preventDefault(); 
                        e.stopPropagation(); // Stop from opening edit modal
                        if(confirm(`Permanently delete '${item.title}'?`)) {
                            await deleteDoc(doc(db, "hubLinks", item.id));
                            showToast("Deleted", "error");
                        }
                    };
                    cardWrapper.appendChild(deleteBtn);
                }

                grid.appendChild(cardWrapper);
            });
        }

        // Bottom Sheet Modal Logic
        function openModal() {
            modal.classList.remove('hidden');
            // Tiny delay to allow display:block to apply before animating transform
            setTimeout(() => {
                modalBackdrop.classList.add('open');
                modalSheet.classList.add('open');
            }, 10);
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closeModal() {
            modalBackdrop.classList.remove('open');
            modalSheet.classList.remove('open');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 400); // Matches CSS transition time
        }

        closeXBtn.onclick = closeModal;
        modalBackdrop.onclick = closeModal; // Tap background to close

        // Open Modal for NEW App
        addCardBtn.onclick = () => {
            currentlyEditingId = null;
            document.getElementById('modal-title').innerText = "Deploy App";
            document.getElementById('input-title').value = '';
            document.getElementById('input-desc').value = '';
            document.getElementById('input-link').value = '/';
            document.getElementById('input-icon').value = 'fa-layer-group';
            document.getElementById('input-color').value = 'zinc';
            document.getElementById('input-hidden').checked = false;
            document.getElementById('save-btn-text').innerText = "Deploy Now";
            openModal();
        };

        // Open Modal for EDITING
        function openEditModal(item) {
            currentlyEditingId = item.id;
            document.getElementById('modal-title').innerText = "Edit Configuration";
            document.getElementById('input-title').value = item.title;
            document.getElementById('input-desc').value = item.desc;
            document.getElementById('input-link').value = item.link;
            document.getElementById('input-icon').value = item.icon || 'fa-layer-group';
            document.getElementById('input-color').value = item.color || 'zinc';
            document.getElementById('input-hidden').checked = item.isHidden || false;
            document.getElementById('save-btn-text').innerText = "Update";
            openModal();
        }

        // Save / Update Logic
        document.getElementById('save-btn').onclick = async () => {
            const title = document.getElementById('input-title').value;
            const desc = document.getElementById('input-desc').value;
            const link = document.getElementById('input-link').value;
            const icon = document.getElementById('input-icon').value;
            const color = document.getElementById('input-color').value;
            const isHidden = document.getElementById('input-hidden').checked;

            if(!title || !link) return showToast("Title and Path required", "error");

            const saveBtnText = document.getElementById('save-btn-text');
            const originalText = saveBtnText.innerText;
            saveBtnText.innerText = "Processing...";

            const payload = { title, desc, link, icon, color, isHidden };

            try {
                if (currentlyEditingId) {
                    await updateDoc(doc(db, "hubLinks", currentlyEditingId), payload);
                    showToast("Updated Successfully");
                } else {
                    payload.createdAt = new Date();
                    payload.orderIndex = hubData.length; 
                    await addDoc(linksCollection, payload);
                    showToast("Deployed Successfully");
                }
                closeModal();
            } catch (error) {
                showToast("System Error", "error");
                console.error(error);
            } finally {
                setTimeout(() => saveBtnText.innerText = originalText, 500);
            }
        };
    </script>
</body>
</html>
